name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      actions: read
      contents: write
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload unsigned MSI for SignPath
        id: upload-unsigned-artifact
        uses: actions/upload-artifact@v4
        with:
          name: flow-unsigned-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Sign MSI with SignPath
        id: signpath
        uses: signpath/github-action-submit-signing-request@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned-artifact.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish signed MSI to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Flow ${{ github.ref_name }}
          body: See the release assets to download and install this version of Flow.
          draft: true
          prerelease: false
          files: signed-artifacts/**/*.msi